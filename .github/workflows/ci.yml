name: RAG CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-rag-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ragas Tests
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        pytest tests/test_ragas_eval.py -v -s --tb=short

    - name: Upload Ragas Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ragas-evaluation-report
        path: ragas_results.json
        retention-days: 7